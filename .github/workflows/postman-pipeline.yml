name: postman-pipeline

on:
  push:
    branches: [main]
    paths:
      - "openapi/**"
      - ".github/workflows/postman-pipeline.yml"
  workflow_dispatch:

concurrency:
  group: postman-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  onboard:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: workday-workforce-provisioning-api
      SPEC_FILE: workday-workforce-provisioning-api.yaml
      DOMAIN: workforce-management
      DOMAIN_CODE: WM
      DISPLAY_NAME: Workday Workforce Provisioning API
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and authenticate Postman CLI
        run: |
          npm install -g postman-cli
          postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      # ── Idempotent preflight: resolve existing resources ──
      - name: Preflight — check for existing workspace & resources
        id: preflight
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          set -euo pipefail

          WS_ID=$(curl -s "https://api.getpostman.com/workspaces" \
            -H "x-api-key: $POSTMAN_API_KEY" | \
            jq -r --arg svc "$PROJECT_NAME" \
            '[.workspaces[] | select(.name | test($svc))] | first | .id // empty')

          if [[ -z "$WS_ID" ]]; then
            echo "No existing workspace found for $PROJECT_NAME"
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found existing workspace: $WS_ID"
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "workspace-id=$WS_ID" >> "$GITHUB_OUTPUT"

          DETAIL=$(curl -s "https://api.getpostman.com/workspaces/$WS_ID" \
            -H "x-api-key: $POSTMAN_API_KEY")

          for prefix in Baseline Smoke Contract; do
            key=$(echo "$prefix" | tr '[:upper:]' '[:lower:]')
            uid=$(echo "$DETAIL" | jq -r --arg p "[$prefix]" --arg svc "$PROJECT_NAME" \
              '[.workspace.collections[] | select(.name == ($p + " " + $svc))] | first | .uid // empty')
            echo "${key}-collection-id=${uid}" >> "$GITHUB_OUTPUT"
          done

          spec_id=$(echo "$DETAIL" | jq -r --arg svc "$PROJECT_NAME" \
            '[.workspace.specs[] | select(.name == $svc)] | first | .id // empty')
          echo "spec-id=${spec_id}" >> "$GITHUB_OUTPUT"

          ENVS=$(curl -s "https://api.getpostman.com/environments" \
            -H "x-api-key: $POSTMAN_API_KEY")
          prod_uid=$(echo "$ENVS" | jq -r --arg svc "$PROJECT_NAME" \
            '[.environments[] | select(.name == ($svc + " - prod"))] | first | .uid // empty')
          echo "prod-env-id=${prod_uid}" >> "$GITHUB_OUTPUT"
          echo "Preflight complete — workspace=$WS_ID spec=$spec_id prod_env=$prod_uid"

      # ── Bootstrap: only runs on first-ever pipeline execution ──
      - name: Bootstrap workspace, spec, and collections
        id: bootstrap
        if: steps.preflight.outputs.exists != 'true'
        uses: postman-cs/postman-bootstrap-action@v0
        with:
          project-name: ${{ env.PROJECT_NAME }}
          spec-url: https://raw.githubusercontent.com/shivemind/jade-${{ env.PROJECT_NAME }}/main/openapi/${{ env.SPEC_FILE }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          domain: ${{ env.DOMAIN }}
          domain-code: ${{ env.DOMAIN_CODE }}

      # ── Merge outputs: prefer existing, fall back to bootstrap ──
      - name: Resolve canonical resource IDs
        id: resources
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.preflight.outputs.exists }}" == "true" ]]; then
            echo "Using existing resource IDs from preflight"
            echo "workspace-id=${{ steps.preflight.outputs.workspace-id }}"           >> "$GITHUB_OUTPUT"
            echo "baseline-collection-id=${{ steps.preflight.outputs.baseline-collection-id }}" >> "$GITHUB_OUTPUT"
            echo "smoke-collection-id=${{ steps.preflight.outputs.smoke-collection-id }}"       >> "$GITHUB_OUTPUT"
            echo "contract-collection-id=${{ steps.preflight.outputs.contract-collection-id }}" >> "$GITHUB_OUTPUT"
          else
            echo "Using newly created IDs from bootstrap"
            echo "workspace-id=${{ steps.bootstrap.outputs.workspace-id }}"                     >> "$GITHUB_OUTPUT"
            echo "baseline-collection-id=${{ steps.bootstrap.outputs.baseline-collection-id }}" >> "$GITHUB_OUTPUT"
            echo "smoke-collection-id=${{ steps.bootstrap.outputs.smoke-collection-id }}"       >> "$GITHUB_OUTPUT"
            echo "contract-collection-id=${{ steps.bootstrap.outputs.contract-collection-id }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Repo sync: uses canonical IDs, safe to re-run ──
      - name: Repo sync — environments, system envs, workspace link
        id: repo_sync
        continue-on-error: true
        uses: postman-cs/postman-repo-sync-action@v0
        with:
          project-name: ${{ env.PROJECT_NAME }}
          workspace-id: ${{ steps.resources.outputs.workspace-id }}
          spec-id: ${{ steps.preflight.outputs.spec-id || steps.bootstrap.outputs.spec-id || '' }}
          baseline-collection-id: ${{ steps.resources.outputs.baseline-collection-id }}
          smoke-collection-id: ${{ steps.resources.outputs.smoke-collection-id }}
          contract-collection-id: ${{ steps.resources.outputs.contract-collection-id }}
          spec-path: openapi/${{ env.SPEC_FILE }}
          environments-json: '["prod","stage"]'
          generate-ci-workflow: false
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── Resolve prod environment: API fallback for robustness ──
      - name: Resolve prod environment UID
        id: resolve_env
        shell: bash
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          set -euo pipefail

          # Priority 1: preflight already resolved it
          prod_id="${{ steps.preflight.outputs.prod-env-id }}"

          # Priority 2: repo-sync output
          if [[ -z "$prod_id" ]]; then
            raw='${{ steps.repo_sync.outputs.environment-uids-json }}'
            if [[ -n "${raw}" && "${raw}" != "null" && "${raw}" != "{}" ]]; then
              prod_id=$(echo "${raw}" | jq -r '.prod // empty')
            fi
          fi

          # Priority 3: direct API lookup
          if [[ -z "$prod_id" ]]; then
            echo "Falling back to API lookup..."
            prod_id=$(curl -s "https://api.getpostman.com/environments" \
              -H "x-api-key: $POSTMAN_API_KEY" | \
              jq -r --arg svc "$PROJECT_NAME" \
              '[.environments[] | select(.name == ($svc + " - prod"))] | first | .uid // empty')
          fi

          echo "prod_env_id=${prod_id:-}" >> "$GITHUB_OUTPUT"
          echo "Resolved prod env: ${prod_id:-NONE}"

      # ── Insights onboarding ──
      - name: Insights onboarding
        id: insights
        if: steps.resolve_env.outputs.prod_env_id != ''
        continue-on-error: true
        uses: postman-cs/postman-insights-onboarding-action@v0
        env:
          INPUT_PROJECT_NAME: ${{ env.PROJECT_NAME }}
          INPUT_WORKSPACE_ID: ${{ steps.resources.outputs.workspace-id }}
          INPUT_ENVIRONMENT_ID: ${{ steps.resolve_env.outputs.prod_env_id }}
          INPUT_CLUSTER_NAME: jade-global-cluster
          INPUT_POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          INPUT_POSTMAN_ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_POLL_TIMEOUT_SECONDS: "180"
          INPUT_POLL_INTERVAL_SECONDS: "15"
        with:
          project-name: ${{ env.PROJECT_NAME }}
          workspace-id: ${{ steps.resources.outputs.workspace-id }}
          environment-id: ${{ steps.resolve_env.outputs.prod_env_id }}
          cluster-name: jade-global-cluster
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          poll-timeout-seconds: "180"
          poll-interval-seconds: "15"

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "### ${{ env.DISPLAY_NAME }}"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| Workspace | \`${{ steps.resources.outputs.workspace-id }}\` |"
            echo "| Baseline | \`${{ steps.resources.outputs.baseline-collection-id }}\` |"
            echo "| Smoke | \`${{ steps.resources.outputs.smoke-collection-id }}\` |"
            echo "| Contract | \`${{ steps.resources.outputs.contract-collection-id }}\` |"
            echo "| Prod Env | \`${{ steps.resolve_env.outputs.prod_env_id }}\` |"
            echo "| Bootstrap | ${{ steps.preflight.outputs.exists == 'true' && 'skipped (existing)' || 'created new' }} |"
            echo "| Repo Sync | \`${{ steps.repo_sync.outcome }}\` |"
            echo "| Insights | \`${{ steps.insights.outcome || 'skipped' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
