type: http
name: Create a worker profile and initiate onboarding
url: '{{baseUrl}}/workers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "workEmail": "tR5FmCmA6zrgiiA@xPlFJWwmAxVsSsQBeoh.mid",
      "department": "string",
      "startDate": "1989-09-25",
      "managerId": "string",
      "location": "string",
      "employmentType": "intern"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "workerId": "5737cbe9-1edb-9a4f-06e5-f6a958199933",
            "employeeNumber": "string",
            "status": "terminated",
            "department": "string",
            "location": "string",
            "startDate": "1958-10-23",
            "onboardingState": "blocked"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker created
