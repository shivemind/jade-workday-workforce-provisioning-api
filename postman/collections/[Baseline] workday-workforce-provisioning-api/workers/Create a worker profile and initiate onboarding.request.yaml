type: http
name: Create a worker profile and initiate onboarding
url: '{{baseUrl}}/workers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "workEmail": "pR4R9@nUecOGkUlPwiahiyYYm.iv",
      "department": "string",
      "startDate": "1966-02-17",
      "managerId": "string",
      "location": "string",
      "employmentType": "intern"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "workerId": "9f978cdb-f6f3-6448-20bd-5523920434da",
            "employeeNumber": "string",
            "status": "prehire",
            "department": "string",
            "location": "string",
            "startDate": "2022-08-28",
            "onboardingState": "blocked"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker created
