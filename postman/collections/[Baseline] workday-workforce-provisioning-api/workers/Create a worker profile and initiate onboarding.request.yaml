type: http
name: Create a worker profile and initiate onboarding
url: '{{baseUrl}}/workers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "workEmail": "UUU@vkyVBAcOlkbPYycIiVXnOiQukiIQbA.xmw",
      "department": "string",
      "startDate": "1982-06-19",
      "managerId": "string",
      "location": "string",
      "employmentType": "contractor"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "workerId": "6c472792-e065-6853-16c2-2b137d1e388a",
            "employeeNumber": "string",
            "status": "prehire",
            "department": "string",
            "location": "string",
            "startDate": "1958-10-26",
            "onboardingState": "pending_access"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker created
