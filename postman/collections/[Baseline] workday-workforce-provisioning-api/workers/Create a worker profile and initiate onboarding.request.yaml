type: http
name: Create a worker profile and initiate onboarding
url: '{{baseUrl}}/workers'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "string",
      "lastName": "string",
      "workEmail": "5b5TRE1G@ZGHeRsUxgucNol.hys",
      "department": "string",
      "startDate": "1946-05-16",
      "managerId": "string",
      "location": "string",
      "employmentType": "intern"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "workerId": "ae9281a0-d46e-95ad-6484-a8fda120555f",
            "employeeNumber": "string",
            "status": "leave",
            "department": "string",
            "location": "string",
            "startDate": "2013-10-25",
            "onboardingState": "completed"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker created
