type: http
name: Get worker profile and onboarding state
url: '{{baseUrl}}/workers/:workerId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: 1c192aba-f522-ba7f-30ba-6cdb6b5bdad3
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "workerId": "9f978cdb-f6f3-6448-20bd-5523920434da",
            "employeeNumber": "string",
            "status": "prehire",
            "department": "string",
            "location": "string",
            "startDate": "2022-08-28",
            "onboardingState": "blocked"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker details
