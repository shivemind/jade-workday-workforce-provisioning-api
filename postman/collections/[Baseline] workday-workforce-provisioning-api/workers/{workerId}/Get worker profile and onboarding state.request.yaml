type: http
name: Get worker profile and onboarding state
url: '{{baseUrl}}/workers/:workerId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: 1bc2a279-4c05-b693-4010-a73636fcae64
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "workerId": "ae9281a0-d46e-95ad-6484-a8fda120555f",
            "employeeNumber": "string",
            "status": "leave",
            "department": "string",
            "location": "string",
            "startDate": "2013-10-25",
            "onboardingState": "completed"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker details
