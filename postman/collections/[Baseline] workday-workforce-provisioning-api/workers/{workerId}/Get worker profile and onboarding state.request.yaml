type: http
name: Get worker profile and onboarding state
url: '{{baseUrl}}/workers/:workerId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: d321209e-2d75-6f2e-d044-4bbe0d65ac89
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "workerId": "6c472792-e065-6853-16c2-2b137d1e388a",
            "employeeNumber": "string",
            "status": "prehire",
            "department": "string",
            "location": "string",
            "startDate": "1958-10-26",
            "onboardingState": "pending_access"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Worker details
