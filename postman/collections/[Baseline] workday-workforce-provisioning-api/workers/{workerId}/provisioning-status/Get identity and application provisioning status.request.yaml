type: http
name: Get identity and application provisioning status
url: '{{baseUrl}}/workers/:workerId/provisioning-status'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: 1c192aba-f522-ba7f-30ba-6cdb6b5bdad3
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "workerId": "62e17377-c0e9-79e4-2006-fcec6db5ca75",
            "identityStatus": "in_progress",
            "laptopStatus": "completed",
            "applicationAccess": [
              {
                "systemName": "string",
                "status": "in_progress"
              },
              {
                "systemName": "string",
                "status": "in_progress"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Provisioning state
