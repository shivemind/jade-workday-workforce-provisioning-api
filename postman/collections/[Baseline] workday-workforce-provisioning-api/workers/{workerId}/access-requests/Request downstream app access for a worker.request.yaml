type: http
name: Request downstream app access for a worker
url: '{{baseUrl}}/workers/:workerId/access-requests'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: 1bc2a279-4c05-b693-4010-a73636fcae64
body:
  type: json
  content: |-
    {
      "systemName": "salesforce",
      "roleName": "string",
      "justification": "string",
      "requestedBy": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "ticketId": "8064f49e-372c-aa63-6d12-f73a1650dd4b",
            "workerId": "d1214467-22a2-383c-fe5a-91420cbe8ade",
            "systemName": "string",
            "status": "completed"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Access request created
