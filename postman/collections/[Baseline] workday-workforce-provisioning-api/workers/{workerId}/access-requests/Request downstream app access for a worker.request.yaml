type: http
name: Request downstream app access for a worker
url: '{{baseUrl}}/workers/:workerId/access-requests'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: 1c192aba-f522-ba7f-30ba-6cdb6b5bdad3
body:
  type: json
  content: |-
    {
      "systemName": "salesforce",
      "roleName": "string",
      "justification": "string",
      "requestedBy": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "ticketId": "cd33cf00-e6ea-edc1-df19-8596d269a481",
            "workerId": "38efde90-958c-b9a3-081a-6647d87c61dc",
            "systemName": "string",
            "status": "completed"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Access request created
