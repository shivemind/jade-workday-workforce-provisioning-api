type: http
name: Request downstream app access for a worker
url: '{{baseUrl}}/workers/:workerId/access-requests'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: workerId
    value: d321209e-2d75-6f2e-d044-4bbe0d65ac89
body:
  type: json
  content: |-
    {
      "systemName": "salesforce",
      "roleName": "string",
      "justification": "string",
      "requestedBy": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "ticketId": "0fa8e91d-0184-30d9-c60c-316d8dc1a408",
            "workerId": "82723d15-884e-2c4f-ed4d-825c48efe305",
            "systemName": "string",
            "status": "queued"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Access request created
